# ─────────────────────────────────────────────────────────
# myTiket — Nginx Vhost untuk aaPanel
# Domain: tiket.andresptr.site
#
# Cara pakai di aaPanel:
#   1. Website → Add Site
#         Domain: tiket.andresptr.site
#         Root  : /opt/mytiket (bebas, kita tidak pakai dir-nya)
#         PHP   : Pure Static (atau "Tidak ada")
#   2. Klik site → Config → tab "Config File"
#   3. REPLACE seluruh isi dengan file ini
#   4. Setting SSL:
#         SSL tab → Let's Encrypt → apply (centang force HTTPS)
#         atau pakai cert yang sudah ada
#   5. Save & Reload nginx
#
# Backend:  http://127.0.0.1:4000 (PM2)
# Frontend: http://127.0.0.1:3000 (PM2)
# ─────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name tiket.andresptr.site;

    # aaPanel certbot ACME challenge (jangan dihapus)
    include /www/server/panel/vhost/nginx/well-known/*.conf;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tiket.andresptr.site;

    # ─── SSL ────────────────────────────────────────────
    # Edit path ini sesuai cert dari aaPanel atau Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/tiket.andresptr.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiket.andresptr.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── Security headers ──────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Gzip ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    client_max_body_size 10M;

    # ─── /api/* → Backend (Fastify :4000) ─────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
    }

    # ─── /* → Frontend (Next.js :3000) ────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache static asset Next.js
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://127.0.0.1:3000;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # aaPanel access/error log path standard
    access_log /www/wwwlogs/tiket.andresptr.site.log;
    error_log  /www/wwwlogs/tiket.andresptr.site.error.log;
}
