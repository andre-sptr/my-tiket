# Local Development
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mytiket_postgres
    environment:
      POSTGRES_DB: mytiket
      POSTGRES_USER: mytiket
      POSTGRES_PASSWORD: mytiket_dev_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mytiket']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mytiket_redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata_dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
  redisdata_dev:
